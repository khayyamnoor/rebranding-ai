<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wadi frame — embed test for BrandVista</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #ddd; }
    header { padding: 12px 16px; background: #155446; color: #fff; }
    header h1 { font-size: 15px; margin: 0 0 4px; }
    header p { font-size: 12px; margin: 0; opacity: .85; }
    .bar { padding: 10px 16px; background: #fff; border-bottom: 1px solid #ccc; }
    .bar button { font-size: 13px; padding: 6px 10px; margin-right: 8px; cursor: pointer; }
    .bar code { font-size: 12px; color: #155446; }
    #host { padding: 16px; display: flex; justify-content: center; }
    /* This wrapper plays the role of Wadi's tool window. */
    #window {
      width: 100%; max-width: 1100px; background: #fff;
      border: 1px solid #bbb; border-radius: 14px; overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,.12); transition: max-width .25s ease;
    }
    iframe { width: 100%; border: 0; display: block; height: 600px; transition: height .2s ease; }
  </style>
</head>
<body>
  <header>
    <h1>This page pretends to be Wadi</h1>
    <p>BrandVista is embedded below in a frame. Watch the frame resize itself, and try the width buttons to check it's responsive.</p>
  </header>
  <div class="bar">
    <button onclick="setW('420px')">Phone width</button>
    <button onclick="setW('768px')">Tablet width</button>
    <button onclick="setW('1100px')">Desktop width</button>
    &nbsp; reported height: <code id="h">—</code>
  </div>
  <div id="host">
    <div id="window">
      <iframe id="frame" title="BrandVista tool"></iframe>
    </div>
  </div>

  <script>
    // The tool URL + ticket are injected by the dev script when it serves this file.
    var TOOL_URL = "%%TOOL_URL%%";
    document.getElementById('frame').src = TOOL_URL;

    function setW(w){ document.getElementById('window').style.maxWidth = w; }

    // Wadi-side: receive height reports from the tool and size the frame.
    window.addEventListener('message', function (e) {
      var d = e.data;
      if (d && d.type === 'wadi:resize' && typeof d.height === 'number') {
        var f = document.getElementById('frame');
        f.style.height = d.height + 'px';
        document.getElementById('h').textContent = d.height + 'px';
      }
    });
  </script>
</body>
</html>
